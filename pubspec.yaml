name: portfolio
description: personal portfolio.

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^7.0.2
  flutter_svg: ^2.0.7
  photo_view: ^0.15.0
  url_launcher: ^6.1.12
  scrollable_positioned_list: ^0.3.8
  provider: ^6.1.2
  flex_color_scheme: ^8.4.0
  shared_preferences: ^2.2.3
  visibility_detector: ^0.4.0+2
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/cover.json
